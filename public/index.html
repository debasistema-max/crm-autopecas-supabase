<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nova Empresa | Login</title>
  <link rel="stylesheet" href="css/theme.css?v=20260701-2">
  <link rel="stylesheet" href="css/login.css?v=20260722-1">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-identity" aria-label="Identidade da empresa">
      <div class="login-identity__content">
        <div class="login-brand">
          <img src="assets/logo-neutral.svg" alt="Nova Empresa" class="login-brand__logo" data-company-logo>
          <div class="login-brand__text">
            <strong data-company-name>Nova Empresa</strong>
            <span>CRM Comercial</span>
          </div>
        </div>
        <div class="login-intro">
          <p class="login-kicker">Ambiente seguro</p>
          <h1>Gestao comercial simplificada.</h1>
        </div>
      </div>
    </section>

    <section class="login-access" aria-labelledby="loginTitle">
      <div class="login-card">
        <header class="login-card__header">
          <p class="login-card__eyebrow">CRM Comercial</p>
          <h2 id="loginTitle">Acessar o sistema</h2>
          <p>Informe seus dados de acesso.</p>
        </header>

        <form id="loginForm" autocomplete="on">
          <label for="usuario">Usuario ou e-mail</label>
          <input id="usuario" name="usuario" type="text" autocomplete="username" required autofocus aria-describedby="loginMessage">

          <label for="senha">Senha</label>
          <div class="login-password">
            <input id="senha" name="senha" type="password" autocomplete="current-password" required aria-describedby="loginMessage">
            <button id="passwordToggle" class="login-password__toggle" type="button" aria-label="Mostrar senha" aria-controls="senha" aria-pressed="false">Mostrar</button>
          </div>

          <button class="btn btn-primary login-submit" id="loginButton" type="submit">
            <span class="login-submit__spinner" aria-hidden="true"></span>
            <span id="loginButtonLabel">Entrar</span>
          </button>
          <p id="loginMessage" class="form-message login-message" role="alert" aria-live="assertive" tabindex="-1"></p>
        </form>
      </div>
      <footer class="login-footer">v3.3.1</footer>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=20260701-2"></script>
  <script src="js/supabase.js?v=20260701-2"></script>
  <script src="js/supabase_store.js?v=20260701-2"></script>
  <script src="js/company_settings.js?v=20260720-1"></script>
  <script src="js/auth.js?v=20260722-1"></script>
</body>
</html>
