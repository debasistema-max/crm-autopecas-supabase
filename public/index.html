<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRM Autopecas | Login</title>
  <link rel="stylesheet" href="css/theme.css?v=20260701-2">
  <link rel="stylesheet" href="css/login.css?v=20260701-2">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-brand" aria-label="CRM Autopecas">
      <img src="assets/logo.png" alt="CRM Autopecas" class="brand-logo">
      <div>
        <p class="eyebrow">Autopecas IPS</p>
        <h1>CRM Comercial</h1>
        <p class="brand-copy">Pedidos, produtos, importacao SAP e operacao comercial em um painel rapido para equipe de vendas.</p>
      </div>
    </section>

    <section class="login-card" aria-label="Entrar">
      <div class="login-card__header">
        <h2>Acessar CRM</h2>
        <p>Use seu usuario e senha cadastrados no sistema.</p>
      </div>

      <form id="loginForm" autocomplete="on">
        <label>
          Usuario
          <input id="usuario" name="usuario" type="text" autocomplete="username" required autofocus>
        </label>
        <label>
          Senha
          <input id="senha" name="senha" type="password" autocomplete="current-password" required>
        </label>
        <button class="btn btn-primary" id="loginButton" type="submit">Entrar</button>
        <p id="loginMessage" class="form-message" role="alert"></p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=20260701-2"></script>
  <script src="js/supabase.js?v=20260701-2"></script>
  <script src="js/supabase_store.js?v=20260701-2"></script>
  <script src="js/auth.js?v=20260701-2"></script>
</body>
</html>
