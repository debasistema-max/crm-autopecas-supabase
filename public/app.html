<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRM Autopecas</title>
  <link rel="stylesheet" href="css/theme.css?v=20260701-5">
  <link rel="stylesheet" href="css/app.css?v=20260702-4">
</head>
<body class="app-page">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <a class="sidebar-brand" href="#dashboard" aria-label="Inicio">
        <img src="assets/logo.png" alt="" class="sidebar-logo">
        <span>CRM Autopecas</span>
      </a>
      <nav class="side-nav" aria-label="Modulos">
        <button class="nav-item is-active" data-module="dashboard">Dashboard</button>
        <button class="nav-item" data-module="products">Produtos</button>
        <button class="nav-item" data-module="orders">Gerar Pedido</button>
        <button class="nav-item" data-module="ordersReport">Pedidos</button>
        <button class="nav-item" data-module="quoteCreate">Criar Cotacao</button>
        <button class="nav-item" data-module="quoteReports">Cotacoes</button>
        <button class="nav-item" data-module="partners">Parceiros</button>
        <button class="nav-item" data-module="sap">Importacao SAP</button>
        <button class="nav-item" data-module="cadastros">Cadastros</button>
        <button class="nav-item" data-module="portalCadastros">Portal Clientes</button>
        <button class="nav-item" data-module="users">Usuarios</button>
        <button class="nav-item" data-module="logs">Logs</button>
      </nav>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <button class="icon-button" id="menuButton" type="button" aria-label="Abrir menu">☰</button>
        <div>
          <p class="topbar-kicker">Operacao Comercial</p>
          <h1 id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-user">
          <span id="userName">Usuario</span>
          <button class="btn btn-ghost" id="logoutButton" type="button">Sair</button>
        </div>
      </header>

      <main class="content" id="content" tabindex="-1"></main>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=20260701-5"></script>
  <script src="js/supabase.js?v=20260701-5"></script>
  <script src="js/supabase_store.js?v=20260702-8"></script>
  <script src="js/supabase_import_fix.js?v=20260701-1"></script>
  <script src="js/auth.js?v=20260701-5"></script>
  <script src="js/dashboard.js?v=20260701-5"></script>
  <script src="js/products.js?v=20260702-2"></script>
  <script src="js/partners.js?v=20260702-1"></script>
  <script src="js/orders.js?v=20260702-6"></script>
  <script src="js/cadastros.js?v=20260702-4"></script>
  <script src="js/quotes.js?v=20260702-7"></script>
  <script src="js/users.js?v=20260701-5"></script>
  <script src="js/app.js?v=20260702-5"></script>
</body>
</html>
